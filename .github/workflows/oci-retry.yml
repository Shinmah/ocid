
name: OCI Free Tier Retry

on:
  schedule:
    - cron: "*/15 * * * *"   # toutes les 15 minutes
  workflow_dispatch: {}        # bouton "Run workflow" manuel dans l'UI GitHub

jobs:
  try-launch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install oci

      - name: Préparer la clé SSH publique
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PUBLIC_KEY }}" > ~/.ssh/id_rsa.pub

      - name: Tentative de création dinstance
        env:
          OCI_USER_OCID: ${{ secrets.OCI_USER_OCID }}
          OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
          OCI_FINGERPRINT: ${{ secrets.OCI_FINGERPRINT }}
          OCI_TENANCY_OCID: ${{ secrets.OCI_TENANCY_OCID }}
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_COMPARTMENT_ID: ${{ secrets.OCI_COMPARTMENT_ID }}
          OCI_AD: ${{ secrets.OCI_AD }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_SSH_KEY_PATH: /home/runner/.ssh/id_rsa.pub
          MAX_ATTEMPTS: "5"
          RETRY_INTERVAL: "100"
          OCI_OCPUS: "2"
          OCI_MEMORY: "12"
        run: python oci_retry.py
